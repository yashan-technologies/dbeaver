# backup settings tips
wizard_backup_page_object_description = 选择要导出的模式、表和视图。
wizard_backup_page_object_checkbox_complete_backup = 完整备份
wizard_backup_page_setting_checkbox_use_insert_tip = 将数据转储为 INSERT 命令（而非 COPY）。这将使恢复非常缓慢；\\n主要用于生成可以加载到非 PostgreSQL 数据库的转储文件。
wizard_backup_page_setting_checkbox_no_privileges = 不备份权限 (GRANT/REVOKE)
wizard_backup_page_setting_checkbox_no_privileges_tip = 阻止转储访问权限（grant/revoke 命令）。
wizard_backup_page_setting_checkbox_no_owner = 丢弃对象所有者
wizard_backup_page_setting_checkbox_no_owner_tip = 不输出设置对象所有权以匹配原始数据库的命令。\\n当输出归档（非文本）格式文件时，此选项将被忽略。\\n对于归档格式，您可以在调用恢复命令时指定该选项。
wizard_backup_page_setting_checkbox_restore_no_owner_tip = 不输出设置对象所有权以匹配原始数据库的命令。
wizard_backup_page_setting_checkbox_drop_objects = 添加删除数据库语句
wizard_backup_page_setting_checkbox_drop_objects_tip = 在输出创建命令之前，输出清理（删除）数据库对象的命令。\\n当输出归档（非文本）格式文件时，此选项将被忽略。\\n对于归档格式，您可以在调用恢复命令时指定该选项。
wizard_backup_page_setting_checkbox_create_database = 添加创建数据库语句
wizard_backup_page_setting_checkbox_create_database_tip = 在输出开头添加创建数据库本身的命令并重新连接到创建的数据库。\\n当输出归档（非文本）格式文件时，此选项将被忽略。\\n对于归档格式，您可以在调用恢复命令时指定该选项。
wizard_backup_page_setting_authentication_save_password = 为任务保存密码
wizard_backup_page_setting_authentication_save_password_tip = 导出时，密码将保存到任务中。

# global backup
wizard_backup_all_page_global_backup_name = 全局备份
wizard_backup_all_page_global_backup_tip = 将被导出的数据库
wizard_backup_all_page_setting_title = 全局备份设置
wizard_backup_all_page_setting_title_setting = 设置
wizard_backup_all_page_setting_label_encoding = 编码
wizard_backup_all_page_setting_checkbox_only_metadata = 仅转储对象定义，不转储数据
wizard_backup_all_page_setting_checkbox_only_metadata_tip = 仅转储对象定义（模式），不转储数据。
wizard_backup_all_page_setting_checkbox_only_global = 仅转储全局对象，不转储数据库
wizard_backup_all_page_setting_checkbox_only_global_tip = 仅转储全局对象（角色和表空间），不转储数据库。\\n仅在选中所有数据库时生效。
wizard_backup_all_page_setting_checkbox_only_roles = 仅转储角色
wizard_backup_all_page_setting_checkbox_only_roles_tip = 仅转储角色，不转储数据库或表空间。\\n仅在选中所有数据库时生效。
wizard_backup_all_page_setting_checkbox_only_tablespaces = 仅转储表空间
wizard_backup_all_page_setting_checkbox_only_tablespaces_tip = 仅转储表空间，不转储数据库或角色。\\n仅在选中所有数据库时生效。
wizard_backup_all_page_setting_checkbox_no_privileges = 不备份权限 (GRANT/REVOKE)
wizard_backup_all_page_setting_checkbox_no_privileges_tip = 阻止转储访问权限（grant/revoke 命令）。
wizard_backup_all_page_setting_checkbox_no_owner = 丢弃对象所有者
wizard_backup_all_page_setting_checkbox_no_owner_tip = 不输出设置对象所有权以匹配原始数据库的命令。\\n默认情况下，pg_dumpall 发出 ALTER OWNER 或 SET SESSION AUTHORIZATION 语句来设置已创建模式元素的所有权。\\n除非由超级用户（或拥有脚本中所有对象的同一用户）启动脚本，否则这些语句将失败。\\n要生成任何用户都可以恢复的脚本，但该用户将获得所有对象的所有权，请指定 -O。
wizard_backup_all_page_setting_checkbox_add_passwords = 转储角色密码
wizard_backup_all_page_setting_checkbox_add_passwords_tip = 以 MD5 哈希格式转储角色密码。

# restore
wizard_restore_page_setting_btn_clean_first_tip = 清理（删除）将要恢复的数据库对象后再重新创建。\\n（如果目标数据库中不存在某些对象，这可能会生成一些无害的错误消息）
wizard_restore_page_setting_confirm_dialog_title = 数据恢复注意事项
wizard_restore_page_setting_confirm_dialog_message = 在恢复数据库对象之前，将对所有要恢复的对象执行 DROP 命令。如果目标数据库中不存在某些对象，将报告可忽略的错误消息，除非在额外命令参数中指定了 --if-exists。\\n此选项适用于覆盖现有数据库。\\n\\n确定要继续吗？
wizard_backup_page_setting_checkbox_restore_create_database = 创建数据库
wizard_backup_page_setting_checkbox_restore_create_database_tip = 在输出开头添加创建数据库本身的命令并重新连接到创建的数据库。

