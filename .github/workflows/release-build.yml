name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout dbeaver
        uses: actions/checkout@v4
        with:
          path: dbeaver
          fetch-depth: 1

      - name: Clone dbeaver-common
        run: git clone --depth 1 https://github.com/dbeaver/dbeaver-common.git dbeaver-common

      - name: Clone dbeaver-jdbc-libsql
        run: git clone --depth 1 https://github.com/dbeaver/dbeaver-jdbc-libsql.git dbeaver-jdbc-libsql

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build release packages
        run: |
          VERSION="${{ github.ref_name }}"
          echo "MAVEN_ARGS=--batch-mode --no-transfer-progress -Ddbeaver-version=${VERSION#v}" >> "$GITHUB_ENV"
          ./dbeaver/tools/build.sh

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dbeaver/product/community/target/products/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
