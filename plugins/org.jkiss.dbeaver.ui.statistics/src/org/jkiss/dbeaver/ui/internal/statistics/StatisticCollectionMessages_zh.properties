statistic_collection_pref_content_opensource_link = DBeaver 是开源的，您可以随时在我们的源代码 <a>{0}</a>\n中核实我们究竟发送了什么\n
statistic_collection_pref_content_datashare_msg = 为了提升用户体验和产品性能，DBeaver 可以收集一些匿名统计信息，用于了解功能使用情况和产品配置。\n\n这些数据不包含任何个人或敏感信息，例如数据库连接配置、\n已执行的查询、数据库信息等。发送的数据遵循 <a>DBeaver Corporation 隐私政策</a>。