# query planner
dialog_query_planner_settings_title = PostgreSQL 执行计划配置
dialog_query_planner_settings_control_label = 额外 EXPLAIN 设置
dialog_query_planner_settings_analyze = ANALYSE
dialog_query_planner_settings_analyze_tip = 执行 EXPLAIN ANALYSE。否则进行简单的 EXPLAIN。\\n注意：对于大表，ANALYSE 可能需要很长时间
dialog_query_planner_settings_verbose = VERBOSE
dialog_query_planner_settings_verbose_tip = 显示有关计划的附加信息。此参数默认为 FALSE。
dialog_query_planner_settings_costs = COSTS
dialog_query_planner_settings_costs_tip = 包括每个计划节点的估计启动和总成本信息，\\n以及每行的估计行数和估计宽度。此参数默认为 TRUE。
dialog_query_planner_settings = SETTINGS
dialog_query_planner_settings_tip = 包括配置参数信息。\\n具体来说，包括与内置默认值不同的影响查询规划的选项。此参数默认为 FALSE。
dialog_query_planner_settings_buffers = BUFFERS
dialog_query_planner_settings_buffers_tip = 包括缓冲区使用信息。默认为 FALSE。
dialog_query_planner_settings_wal = WAL
dialog_query_planner_settings_wal_tip = 包括 WAL 记录生成信息。\\n具体来说，包括记录数、全页镜像 (fpi) 数量以及生成的 WAL 字节数。\\n在文本格式中，仅打印非零值。\\n此参数只能在 ANALYZE 也启用时使用。默认为 FALSE。
dialog_query_planner_settings_timing = TIMING
dialog_query_planner_settings_timing_tip = 在输出中包括每个节点的实际启动时间和花费时间。默认为 TRUE。
dialog_query_planner_settings_summary = SUMMARY
dialog_query_planner_settings_summary_tip = 在查询计划后包括摘要信息（如总计时间信息）。\\n使用 ANALYZE 时默认包含摘要信息，否则默认不包含，\\n但可以使用此选项启用。

