<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
    </style>
</head>
<body>
<div style=" background: #ffffff; width: 100%; max-width: 460px; overflow: hidden;">
    <div style="padding: 32px 32px 24px; text-align: center">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #e8f2fa; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M20 6L9 17l-5-5" stroke="#2a7cb4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2 style="font-size: 18px; font-weight: 500; color: #1a1a1a; margin: 0 0 8px;">
            Authentication complete
        </h2>
        <p style="font-size: 14px; color: #666; line-height: 1.5; margin: 0 0 4px;">
            It was requested by <strong style="color: #1a1a1a; font-weight: 500">${PRODUCT_NAME}</strong>
        </p>
        <p style="font-size: 14px; color: #666; line-height: 1.5; margin: 0 0 24px;">
            You have successfully authorized ${AUTH_NAME}.
        </p>
        <button style=" padding: 9px 24px; font-size: 14px; font-weight: 500; border-radius: 6px; border: none; background: #2a7cb4; color: #fff; cursor: pointer;" onclick="window.close()">
            Close
        </button>
    </div>
</div>
</body>
</html>
