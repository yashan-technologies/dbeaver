name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout dbeaver
        uses: actions/checkout@v4
        with:
          path: dbeaver
          fetch-depth: 1

      - name: Clone dbeaver-common
        run: git clone --depth 1 https://github.com/dbeaver/dbeaver-common.git dbeaver-common

      - name: Clone dbeaver-jdbc-libsql
        run: git clone --depth 1 https://github.com/dbeaver/dbeaver-jdbc-libsql.git dbeaver-jdbc-libsql

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build release packages
        working-directory: dbeaver
        env:
          DBEAVER_VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from tag name to get numeric version
          VERSION="${DBEAVER_VERSION#v}"
          ../dbeaver-common/mvnw clean install \
            -Pproduct-dbeaver-ce,product-dbeaver-eclipse-ce,appstore \
            -T 1C \
            -f product/aggregate \
            -Ddbeaver-version="${VERSION}" \
            --batch-mode \
            --no-transfer-progress

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dbeaver/product/community/target/products/*.zip
            dbeaver/product/community/target/products/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
