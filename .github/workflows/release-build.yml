name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_PACKAGE_DIR: dbeaver/product/community/target/release-packages
    steps:
      - name: Checkout dbeaver
        uses: actions/checkout@v4
        with:
          path: dbeaver
          fetch-depth: 1

      - name: Clone dbeaver-common
        run: git clone --depth 1 https://github.com/dbeaver/dbeaver-common.git dbeaver-common

      - name: Clone dbeaver-jdbc-libsql
        run: git clone --depth 1 https://github.com/dbeaver/dbeaver-jdbc-libsql.git dbeaver-jdbc-libsql

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MAVEN_ARGS=--batch-mode --no-transfer-progress -DskipTests" >> "$GITHUB_ENV"

      - name: Build release packages
        run: |
          ./dbeaver/tools/build.sh

      - name: Verify release packages
        run: |
          set -euo pipefail

          expected_count=6
          actual_count="$(find "$RELEASE_PACKAGE_DIR" -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) | wc -l)"

          if [ "$actual_count" -ne "$expected_count" ]; then
            echo "Expected $expected_count release packages, found $actual_count"
            find "$RELEASE_PACKAGE_DIR" -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dbeaver/product/community/target/release-packages/*.zip
            dbeaver/product/community/target/release-packages/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
